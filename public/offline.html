<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08111e" />
    <title>Loafers Home Bakery — Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --paper: #08111e;
        --ink: #f5dfbd;
        --muted: #c7ad86;
        --accent: #c98b43;
        --line: rgba(231, 196, 145, .34);
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        color: var(--ink);
        background:
          radial-gradient(circle at 72% 10%, rgba(125, 43, 166, .34), transparent 28%),
          radial-gradient(circle at 62% 18%, rgba(82, 188, 103, .26), transparent 30%),
          linear-gradient(180deg, #020509, var(--paper));
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(8,17,30,.84);
        box-shadow: 0 24px 70px rgba(0, 0, 0, .42);
      }

      span {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        margin-bottom: 16px;
        overflow: hidden;
        color: white;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: #020509;
      }

      span img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 42px;
        font-weight: 500;
        letter-spacing: -.04em;
        line-height: .96;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      button {
        width: 100%;
        min-height: 48px;
        color: white;
        border: 0;
        border-radius: 14px;
        background: var(--accent);
        font-size: 15px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <span><img src="./brand/loafers-home-bakery-badge.png" alt="" /></span>
      <h1>Loafers is offline.</h1>
      <p>Your installed Loafers Home Bakery app shell is saved on this device. Reconnect to sync cloud orders, customer history, and fresh menu data.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
