<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfaf7" />
    <title>Loafers — Offline</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #fbfaf7;
        --ink: #2c241f;
        --muted: #766e66;
        --accent: #cf5638;
        --line: #e4d9cc;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        color: var(--ink);
        background: radial-gradient(circle at top, #fff6e8, transparent 40%), var(--paper);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255,255,255,.82);
        box-shadow: 0 24px 70px rgba(67, 45, 28, .12);
      }

      span {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        margin-bottom: 16px;
        color: white;
        border-radius: 18px;
        background: var(--accent);
        font-size: 26px;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 42px;
        font-weight: 500;
        letter-spacing: -.04em;
        line-height: .96;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      button {
        width: 100%;
        min-height: 48px;
        color: white;
        border: 0;
        border-radius: 14px;
        background: var(--accent);
        font-size: 15px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <span>🍞</span>
      <h1>Loafers is offline.</h1>
      <p>Your installed app shell is saved on this device. Reconnect to sync cloud orders, customer history, and fresh menu data.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
